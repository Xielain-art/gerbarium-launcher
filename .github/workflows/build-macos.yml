name: macOS Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run unit tests
        env:
          NODE_ENV: development
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Run Smoke Test (macOS)
        run: npm run test:smoke

      - name: Build macOS package (no publish)
        if: startsWith(github.ref, 'refs/heads/')
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DISCORD_RPC_CLIENT_ID: ${{ vars.DISCORD_RPC_CLIENT_ID }}
        run: npm run dist:mac

      - name: Build and Publish macOS package (with publish)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DISCORD_RPC_CLIENT_ID: ${{ vars.DISCORD_RPC_CLIENT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish-app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gerbarium-macos
          path: |
            release/*.dmg
          if-no-files-found: warn
