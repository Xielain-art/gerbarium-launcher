name: Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  debug-context:
    name: Debug GitHub Context
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_type=${{ github.ref_type }}"
          echo "ref_name=${{ github.ref_name }}"

  ci:
    name: CI (${{ matrix.os }})
    needs: debug-context
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Validate packwiz env
        env:
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        shell: bash
        run: |
          if [ -z "${PACKWIZ_PACK_URL:-}" ]; then
            echo "PACKWIZ_PACK_URL is required"
            exit 1
          fi

      - name: Run unit tests
        env:
          NODE_ENV: development
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY != '' && secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        run: npm run test:unit

      - name: Build application
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY != '' && secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        run: npm run build

      - name: Install Playwright browsers
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi

      - name: Run Smoke Test
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY != '' && secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
          SMOKE_TEST: 'true'
          E2E_FORCE_SMOKE: 'true'
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            xvfb-run npm run test:smoke
          else
            npm run test:smoke
          fi
        shell: bash

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

