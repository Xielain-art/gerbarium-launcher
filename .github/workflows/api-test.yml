name: API Integration Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Validate packwiz env
        env:
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        shell: bash
        run: |
          if [ -z "${PACKWIZ_PACK_URL:-}" ]; then
            echo "PACKWIZ_PACK_URL is required"
            exit 1
          fi

      - name: Run API Tests
        env:
          NODE_ENV: development
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        run: npm run test:auth
