name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v3.0.3"
        required: true
        type: string

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          repository: Xielain-art/gerbarium-releases
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: false

  package:
    name: Package and Upload (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Validate packwiz env
        env:
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        shell: bash
        run: |
          if [ -z "${PACKWIZ_PACK_URL:-}" ]; then
            echo "PACKWIZ_PACK_URL is required"
            exit 1
          fi

      - name: Build platform package
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DISCORD_RPC_CLIENT_ID: ${{ vars.DISCORD_RPC_CLIENT_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY != '' && secrets.CURSEFORGE_API_KEY || vars.CURSEFORGE_API_KEY }}
          PACKWIZ_PACK_URL: ${{ secrets.PACKWIZ_PACK_URL != '' && secrets.PACKWIZ_PACK_URL || vars.PACKWIZ_PACK_URL }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npm run dist:linux
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run dist:win
          else
            npm run dist:mac
          fi

      - name: Upload files directly to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          repository: Xielain-art/gerbarium-releases
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
            release/*.yml
            release/*.yaml
            release/*.blockmap
          fail_on_unmatched_files: false
