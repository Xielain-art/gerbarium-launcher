name: Linux Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit

      - name: Run unit tests
        env:
          NODE_ENV: development
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npm run test:unit

      - name: Build application
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npm run build

      - name: Run Smoke Test (Linux)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: xvfb-run npm run test:smoke

      - name: Build Linux package (no publish)
        if: startsWith(github.ref, 'refs/heads/')
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DISCORD_RPC_CLIENT_ID: ${{ vars.DISCORD_RPC_CLIENT_ID }}
        run: npm run dist:linux

      - name: Build and Publish Linux package (with publish)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          DISCORD_RPC_CLIENT_ID: ${{ vars.DISCORD_RPC_CLIENT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish-app

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gerbarium-linux
          path: |
            release/*.AppImage
          if-no-files-found: warn
