<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>src-ui</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #06050c;
      }

      #bootstrap-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 50% 35%,
            rgba(169, 140, 255, 0.16) 0%,
            rgba(6, 5, 12, 0.35) 34%,
            rgba(6, 5, 12, 0.92) 78%
          ),
          linear-gradient(180deg, #0b0916 0%, #06050c 100%);
        color: #f7f1ff;
        z-index: 9999;
      }

      #bootstrap-splash__video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.88;
      }

      #bootstrap-splash__veil {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            180deg,
            rgba(3, 3, 8, 0.18) 0%,
            rgba(3, 3, 8, 0.58) 100%
          ),
          radial-gradient(
            circle at 50% 35%,
            rgba(169, 140, 255, 0.12) 0%,
            transparent 30%
          );
      }

      #bootstrap-splash__titlebar {
        position: absolute;
        top: 1rem;
        left: 1rem;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 0.85rem;
        border: 1px solid rgba(169, 140, 255, 0.18);
        border-radius: 9999px;
        background: rgba(11, 9, 22, 0.5);
        backdrop-filter: blur(14px);
        font:
          700 0.65rem/1.2 "Source Code Pro",
          Consolas,
          monospace;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #a98cff;
      }

      #bootstrap-splash__title {
        font:
          700 0.7rem/1.2 "Source Code Pro",
          Consolas,
          monospace;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #a98cff;
      }

      #bootstrap-splash__subtitle {
        font:
          500 0.95rem/1.4 Avenir,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #f7f1ff;
      }

      #bootstrap-splash__phase {
        font:
          500 0.68rem/1.4 "Source Code Pro",
          Consolas,
          monospace;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(208, 205, 219, 0.76);
      }

      #bootstrap-splash__progress-wrap {
        width: 100%;
        margin-top: 0.25rem;
      }

      #bootstrap-splash__progress-track {
        width: 100%;
        height: 2px;
        overflow: hidden;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.08);
      }

      #bootstrap-splash__progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #856cf2 0%, #a98cff 100%);
        box-shadow: 0 0 12px rgba(169, 140, 255, 0.28);
        transition: width 180ms ease;
      }

      #bootstrap-splash__progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 0.45rem;
        font:
          500 0.64rem/1.4 "Source Code Pro",
          Consolas,
          monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(208, 205, 219, 0.68);
      }

      #bootstrap-splash__hint {
        font:
          500 0.65rem/1.4 "Source Code Pro",
          Consolas,
          monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(208, 205, 219, 0.72);
      }

      #bootstrap-splash__bottom {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1;
        padding: 1rem 1.25rem 1.15rem;
        background: linear-gradient(
          180deg,
          rgba(6, 5, 12, 0) 0%,
          rgba(6, 5, 12, 0.78) 55%,
          rgba(6, 5, 12, 0.94) 100%
        );
      }

      #bootstrap-splash__bottom-inner {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-width: 72rem;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="bootstrap-splash" aria-hidden="true">
      <video
        id="bootstrap-splash__video"
        autoplay
        muted
        playsinline
        preload="auto"
        src="src/renderer/public/intro.mp4"
      ></video>
      <div id="bootstrap-splash__veil"></div>
      <div id="bootstrap-splash__titlebar">Security Preflight</div>
      <div id="bootstrap-splash__bottom">
        <div id="bootstrap-splash__bottom-inner">
          <div id="bootstrap-splash__phase">
            Initializing security checks...
          </div>
          <div id="bootstrap-splash__progress-wrap" aria-hidden="true">
            <div id="bootstrap-splash__progress-track">
              <div id="bootstrap-splash__progress-fill"></div>
            </div>
            <div id="bootstrap-splash__progress-meta">
              <span id="bootstrap-splash__progress-label">Checking hash</span>
              <span id="bootstrap-splash__progress-percent">0%</span>
            </div>
          </div>
          <div id="bootstrap-splash__subtitle">
            Verifying integrity before launch
          </div>
          <div id="bootstrap-splash__hint">Loading crystal intro</div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
    <script>
      (function bootstrapIntroVideo() {
        const video = document.getElementById("bootstrap-splash__video");
        const hint = document.getElementById("bootstrap-splash__hint");
        const phase = document.getElementById("bootstrap-splash__phase");
        const fill = document.getElementById("bootstrap-splash__progress-fill");
        const percent = document.getElementById("bootstrap-splash__progress-percent");
        const label = document.getElementById("bootstrap-splash__progress-label");
        if (!video) return;

        const setHint = (text) => {
          if (hint) hint.textContent = text;
        };
        const phases = [
          "Initializing security checks...",
          "Fetching release manifest...",
          "Calculating local hash...",
          "Verifying launcher integrity...",
        ];
        let phaseIndex = 0;
        let progressValue = 0;

        const setProgress = (value) => {
          const clamped = Math.max(0, Math.min(100, Math.round(value)));
          if (fill) fill.style.width = clamped + "%";
          if (percent) percent.textContent = clamped + "%";
          if (label) label.textContent = clamped < 100 ? "Checking hash" : "Integrity verified";
        };

        const phaseTimer = window.setInterval(() => {
          if (!phase) return;
          phaseIndex = Math.min(phases.length - 1, phaseIndex + 1);
          phase.textContent = phases[phaseIndex];
        }, 700);

        const progressTimer = window.setInterval(() => {
          progressValue = Math.min(88, progressValue + Math.random() * 7 + 2);
          setProgress(progressValue);
        }, 180);

        window.__gerbSplashTimers = { phaseTimer, progressTimer };

        video.addEventListener("error", () => {
          setHint("Crystal intro unavailable");
        });

        const playAttempt = video.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {
            setHint("Crystal intro unavailable");
          });
        }
      })();
    </script>
  </body>
</html>
