appId: 'gerbariumlauncher'
productName: 'Gerbarium'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2026 Gerbarium Radmir Klimau'

asar: true
compression: 'maximum'

# Указываем, какие файлы брать, а какие игнорировать
files:
  - 'dist/**/*'
  - 'package.json'
  - '_legacy_app/**/*'
  - 'libraries/**/*'
  - '!{release,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs,node_modules}'

extraResources:
  - 'libraries'

# Windows Configuration
win: 
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux: 
  target: 'AppImage'
  maintainer: 'Daniel Scalzi'
  vendor: 'Daniel Scalzi'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'

# Настройки папок
directories:
  buildResources: 'build'
  output: 'release'

publish:
  provider: github
  owner: Xielain-art 
  repo: gerbarium-releases
